name: 🔨 Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      op_model:
        description: 'Select the OnePlus Devices to build'
        required: true
        type: choice
        options:
          - All
          - OP-ACE
          - OP-ACE-2
          - OP-ACE-2-PRO
          - OP-ACE-2V
          - OP-ACE-3
          - OP-ACE-3-PRO
          - OP-ACE-3V
          - OP-ACE-5
          - OP-ACE-5-PRO
          - OP-ACE-5-RACE
          - OP-ACE-5-ULTRA
          - OP-ACE-6
          - OP-ACE-6T
          - OP-ACE-RACE
          - OP-NORD-3
          - OP-NORD-4
          - OP-NORD-4-CE
          - OP-NORD-5
          - OP-NORD-CE-5
          - OP-NORD-CE4-LITE
          - OP-OPEN
          - OP-PAD-2-MT6991
          - OP-PAD-2-PRO
          - OP-PAD-2-SM8650
          - OP-PAD-3-MT6897
          - OP-PAD-3-SM8750
          - OP-PAD-GO-2
          - OP-PAD-LITE
          - OP-PAD-MT6983
          - OP-PAD-PRO
          - OP10pro
          - OP10r
          - OP10t
          - OP11
          - OP11r
          - OP12
          - OP12r
          - OP13
          - OP13-CPH
          - OP13-PJZ
          - OP13S
          - OP13T
          - OP13r
          - OP15
          - OP15r
        default: All
      android_version_filter:
        description: 'Select the Android Version to build'
        required: true
        type: choice
        options:
          - All
          - oos14
          - oos15
          - oos16
          - oos14+oos15
          - oos15+oos16
          - oos14+oos16
        default: All
      kernel_version_filter:
        description: 'Select the Kernel Version to build'
        required: true
        type: choice
        options:
          - All
          - android12-5.10
          - android13-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
        default: All
      ksu_options:
        description: 'Enter KernelSU build json'
        required: true
        type: string
        default: '[{"type":"ksun","hash":"dev"}]'
      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options: [O2, O3]
        default: O2
      clean_build:
        description: 'Clean build (no ccache)'
        type: boolean
        default: false
      android12-5_10_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android12-5.10'
        type: string
        default: ''      
      android13-5_15_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android13-5.15'
        type: string
        default: ''      
      android14-6_1_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android14-6.1'
        type: string
        default: ''
      android15-6_6_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android15-6.6'
        type: string
        default: ''
      android16-6_12_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android16-6.12'
        type: string
        default: ''

jobs:
  set-op-model:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      device_count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - name: 📥 Checkout Code (to access configs/)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            configs/
          sparse-checkout-cone-mode: false

      - name: 🔍 Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Matrix generation"
          
          input="${{ github.event.inputs.op_model }}"
          ksu_options_raw='${{ github.event.inputs.ksu_options }}'
          if ! ksu_options_normalized=$(echo "$ksu_options_raw" | jq -c 'map(if .type then .type |= ascii_upcase | if .hash == null then if .type == "KSUN" then .hash = "dev" elif .type == "KSU" then .hash = "main" else .hash end else . end else error("No type found") end)' 2>&1); then
            echo "::error::ksu_options validation failed: $ksu_options_normalized"
            exit 1
          fi
          
          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i+1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done
          echo "]" >> matrix.json
          
          jq_filter="."
          
          case "$input" in
            All)
              ;;
            *)
              echo "ℹ️  Device-specific filter applied: $input"
              jq_filter="map(select(.model == \"$input\"))"
              ;;
          esac
          
          android_input="${{ github.event.inputs.android_version_filter }}"
          android_jq_filter=""
          
          case "$android_input" in
            "All")
              # No additional filtering needed
              ;;
            "oos14")
              android_jq_filter=" | map(select(.os_version == \"OOS14\"))"
              ;;
            "oos15")
              android_jq_filter=" | map(select(.os_version == \"OOS15\"))"
              ;;
            "oos16")
              android_jq_filter=" | map(select(.os_version == \"OOS16\"))"
              ;;
            "oos14+oos15" | "oos15+oos14")
              android_jq_filter=" | map(select(.os_version == \"OOS14\" or .os_version == \"OOS15\"))"
              ;;
            "oos15+oos16" | "oos16+oos15")
              android_jq_filter=" | map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\"))"
              ;;
            "oos14+oos16" | "oos16+oos14")
              android_jq_filter=" | map(select(.os_version == \"OOS14\" or .os_version == \"OOS16\"))"
              ;;
            *)
              echo "::warning::Unknown Android version filter '$android_input'."
              ;;
          esac

          kernel_input="${{ github.event.inputs.kernel_version_filter }}"
          kernel_jq_filter=""
          
          if [[ "$kernel_input" != "All" ]]; then
            IFS='-' read -r ak_android ak_kernel <<< "$kernel_input"
            kernel_jq_filter=" | map(select(.android_version == \"$ak_android\" and .kernel_version == \"$ak_kernel\"))"
            echo "ℹ️  Kernel version filter applied: $kernel_input"
          fi

          combined_filter="${jq_filter}${android_jq_filter}${kernel_jq_filter}"
          filtered=$(jq -c "$combined_filter" matrix.json)
          count=$(jq 'length' <<<"$filtered")
          
          if [ "$count" -eq 0 ]; then
            echo "::error::No config files found for input '$input' after applying filters!"
            echo ""
            echo "Available configurations:"
            jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' matrix.json
            exit 1
          fi
          
          # For each device + each ksu option → one combined entry
          merged_matrix=$(jq -n --argjson devices "$filtered" --argjson ksu_list "$ksu_options_normalized" '[ $devices[] as $dev | $ksu_list[] as $ksu | ($dev + {ksu_type: $ksu.type, ksu_hash: $ksu.hash}) ]')
          
          final_count=$(echo "$merged_matrix" | jq -s length)
          
          wrapped=$(jq -n --argjson items "$merged_matrix" '{ include: $items }')
          
          echo "✅ Found $final_count device(s) to build"
          echo ""
          echo "Selected devices:"
          jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version), \(.ksu_type) - \(.ksu_hash))"' <<<"$merged_matrix"
          
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          
          echo "::endgroup::"

      - name: Upload build matrix
        uses: actions/upload-artifact@v6
        with:
          name: build-matrix
          path: matrix.json
          retention-days: 1

      - name: 📊 Build plan summary
        run: |
          ksu_options_raw='${{ github.event.inputs.ksu_options }}'
          ksu_options_normalized=$(echo "$ksu_options_raw" | jq -c 'map(if .type then .type |= ascii_upcase | if .hash == null then if .type == "KSUN" then .hash = "dev" elif .type == "KSU" then .hash = "main" else .hash end else . end else error("No type found") end)' 2>&1)
          
          # export KSU_OPTIONS="$ksu_options_normalized"
          
          # cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # ## 🎯 Build Plan
          
          # **Target:** `${{ inputs.op_model }}`  
          # **Devices:** ${{ steps.set-matrix.outputs.count }}  
          
          # **Configuration:**
          # - KSU Config: `"$KSU_OPTIONS"`
          # - Optimization: `${{ inputs.optimize_level }}`
          # - Clean Build/No Ccache: ${{ inputs.clean_build && '✅ Yes' || '❌ No' }}
          
          # **SUSFS Configuration:**
          # EOF
          
          {
            cat << 'EOF'
          ## 🎯 Build Plan
          
          **Target:** ${{ inputs.op_model }}  
          **Devices:** ${{ steps.set-matrix.outputs.count }}  
          
          **Configuration:**
          - KSU Config: `
          EOF
          
            # Inject the shell variable
            printf '%s' "$ksu_options_normalized"
          
            cat << 'EOF'
          `
          - Optimization: ${{ inputs.optimize_level }}
          - Clean Build/No Ccache: ${{ inputs.clean_build && '✅ Yes' || '❌ No' }}
          
          **SUSFS Configuration:**
          EOF
          } >> "$GITHUB_STEP_SUMMARY"
          
          # Display SUSFS config for each kernel version
          declare -A susfs_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )
          
          for key in "android12-5.10" "android13-5.15" "android14-6.1" "android15-6.6" "android16-6.12"; do
            value="${susfs_inputs[$key]}"
            
            if [ -z "$value" ]; then
              echo "- $key: 🔄 auto (\`gki-$key\`)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- $key: 📌 \`$value\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **💡 Note:** Empty values auto-map to matching \`gki-androidX-Y.Z\` branches." >> $GITHUB_STEP_SUMMARY
          
          # Add OOS restriction note for android-kernel filters
          if [[ "${{ inputs.op_model }}" == android*-*.* ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **⚠️ Android-Kernel Filter:** Only OOS15 and OOS16 devices will be built for \`${{ inputs.op_model }}\`" >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: build (${{ matrix.model }}, ${{ matrix.soc }}, ${{ matrix.branch }}, ${{ matrix.manifest }}, ${{ matrix.android_version }}, ${{ matrix.kernel_version }}, ${{ matrix.os_version }}, ${{ matrix.ksu_type }})
    needs: set-op-model
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix) }}
    outputs:
      ksun_ver: ${{ steps.build-stat.outputs.ksu_version }}
      ksu_ver: ${{ steps.build-stat.outputs.ksu_version }}
    steps:
      - name: 🧹 Emergency Disk Cleanup
        if: ${{ matrix.disk_cleanup }}
        run: |
          echo "::group::Disk Usage Before Cleanup"
          df -h
          echo "::endgroup::"
          
          echo "::group::Removing Unnecessary Software"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          if command -v docker >/dev/null 2>&1; then
            docker rmi $(docker images -q) 2>/dev/null || true
          fi
          echo "::endgroup::"
          
          echo "::group::Disk Usage After Cleanup"
          df -h
          AVAIL=$(df -h / | awk 'NR==2 {print $4}')
          echo "✅ Available space: $AVAIL"
          echo "::endgroup::"

      - name: Download Apache Arrow's util_free_space.sh
        if: ${{ matrix.disk_cleanup }}
        run: |
          curl -L -o util_free_space.sh https://raw.githubusercontent.com/apache/arrow/main/ci/scripts/util_free_space.sh
          chmod +x util_free_space.sh
          ./util_free_space.sh

      - name: 🔍 Resolve SUSFS branch from inputs
        id: susfs
        shell: bash
        if: ${{ matrix.susfs }}
        run: |
          set -euo pipefail
          
          key="${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          
          echo "Looking up SUSFS branch for: $key"
          
          # Map kernel version to input value
          case "$key" in
            "android12-5.10")
              susfs_branch="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
              ;;
            "android13-5.15")
              susfs_branch="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
              ;;
            "android14-6.1")
              susfs_branch="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
              ;;
            "android15-6.6")
              susfs_branch="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
              ;;
            "android16-6.12")
              susfs_branch="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
              ;;
            *)
              echo "::error::Unsupported kernel version: $key"
              exit 1
              ;;
          esac
          
          # If empty, it will be auto-resolved to gki-* branch in the action
          if [ -z "$susfs_branch" ]; then
            echo "ℹ️  No custom SUSFS branch specified for $key"
            echo "   Will auto-select: gki-$key"
          else
            echo "✅ Using custom SUSFS branch for $key: '$susfs_branch'"
          fi
          
          echo "susfs_branch=$susfs_branch" >> "$GITHUB_OUTPUT"

      - name: 📥 Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Minimal Dependencies
        run: |
          set -euo pipefail
          echo "::group::Install dependencies"
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc dos2unix kmod libdw-dev elfutils
          sudo apt-get clean
          echo "✅ Dependencies installed"
          echo "::endgroup::"

      - name: 📦 Disk usage (pre-build)
        run: |
          echo "::group::Disk usage pre-build"
          df -h /
          du -sh "$GITHUB_WORKSPACE" 2>/dev/null || true
          sudo rm -rf /tmp/* || true
          echo "::endgroup::"

      - name: ♻️ Configure ccache (bounded)
        if: ${{ inputs.clean_build != true }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "::group::ccache configuration"
            ccache -o max_size=1.0G
            ccache -o compression=true
            ccache -o compression_level=3
            ccache -s
            echo "::endgroup::"
          fi

      - name: 🧹 Prepare op_config_json (without KSU fields)
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc --argjson m '${{ toJSON(matrix) }}' '$m | del(.ksu_type, .ksu_hash)')" >> "$GITHUB_OUTPUT"

      - name: 🔨 Build Kernel
        id: build
        uses: ./.github/actions
        with:
          op_config_json: ${{ steps.prepare_config.outputs.config_json }}
          ksu_type: ${{ matrix.ksu_type }}
          ksu_branch_or_hash: ${{ matrix.ksu_hash }}
          susfs_commit_hash_or_branch: ${{ steps.susfs.outputs.susfs_branch }}
          optimize_level: ${{ inputs.optimize_level }}
          clean: ${{ inputs.clean_build }}

      - name: 📊 Build statistics
        id: build-stat
        if: always()
        run: |
          echo "::group::Build Statistics"
          
          echo "Device: ${{ matrix.model }}"
          echo "OS Version: ${{ matrix.os_version }}"
          echo "Kernel: ${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          if [ "${{ matrix.susfs }}" = true ]; then
            echo "SUSFS Branch: ${{ steps.susfs.outputs.susfs_branch }}"
          fi
          echo "Status: ${{ job.status }}"
          
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo ""
            echo "✅ Build completed successfully"
            echo ""
            echo "Outputs:"
            echo "  - Kernel: ${{ steps.build.outputs.kernel_version }}"
            if [ "${{ matrix.ksu_type }}" = "KSUN" ]; then
              echo "  - KSU Next: v${{ steps.build.outputs.ksu_version }}"
              echo "ksun_ver=${{ steps.build.outputs.ksu_version }}" >> "$GITHUB_OUTPUT"
              echo "ksu_ver=" >> "$GITHUB_OUTPUT"
            else
              echo "  - KSU: v${{ steps.build.outputs.ksu_version }}"
              echo "ksun_ver=" >> "$GITHUB_OUTPUT"
              echo "ksu_ver=${{ steps.build.outputs.ksu_version }}" >> "$GITHUB_OUTPUT"
            fi
            if [ "${{ matrix.susfs }}" = true ]; then
              echo "  - SUSFS: ${{ steps.build.outputs.susfs_version }}"
            fi
            echo "  - Build time: ${{ steps.build.outputs.build_time }}s"
            
            if [ "${{ inputs.clean_build }}" != "true" ]; then
              echo "  - ccache hit rate: ${{ steps.build.outputs.ccache_hit_rate }}"
              echo "  - ccache direct rate: ${{ steps.build.outputs.ccache_direct_rate }}"
            else
              echo "  - ccache: disabled (clean build)"
            fi
            
            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "  - Warnings: ${{ steps.build.outputs.warnings }}"
            fi
          else
            echo "❌ Build failed"
          fi
          
          echo "::endgroup::"

      - name: 📝 Job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          
          ### ${{ matrix.model }} (${{ matrix.os_version }}) - ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}
          
          **Kernel:** ${{ matrix.android_version }}-${{ matrix.kernel_version }}
          EOF
          
          if [ "${{ matrix.susfs }}" = true ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          **SUSFS Branch:** \`${{ steps.susfs.outputs.susfs_branch || format('(auto: gki-{0}-{1})', matrix.android_version, matrix.kernel_version) }}\`
          EOF
          fi
          
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          | Metric | Value |
          |--------|-------|
          | **Kernel** | ${{ steps.build.outputs.kernel_version }} |
          EOF
            if [ "${{ matrix.ksu_type }}" = "KSUN" ]; then
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **KSU Next** | v${{ steps.build.outputs.ksu_version }} |
          EOF
            else
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **KSU** | v${{ steps.build.outputs.ksu_version }} |
          EOF
            fi
            
            if [ "${{ matrix.susfs }}" = true ]; then
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **SUSFS** | ${{ steps.build.outputs.susfs_version }} |
          EOF
            fi
          cat >> $GITHUB_STEP_SUMMARY << EOF
          | **Build Time** | ${{ steps.build.outputs.build_time }}s |
          EOF
            
            if [ "${{ inputs.clean_build }}" != "true" ]; then
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **ccache Hit Rate** | ${{ steps.build.outputs.ccache_hit_rate }} |
          | **ccache Direct Rate** | ${{ steps.build.outputs.ccache_direct_rate }} |
          EOF
            fi
            
            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "| **Warnings** | ${{ steps.build.outputs.warnings }} |" >> $GITHUB_STEP_SUMMARY
            fi
            
            cat >> $GITHUB_STEP_SUMMARY << EOF
          
          **SHA256:** \`${{ steps.build.outputs.image_sha256 }}\`
          EOF
          fi

      - name: 🧹 Final cleanup and space report
        if: always()
        run: |
          echo "::group::Cleanup"
          
          # Remove build artifacts but PRESERVE ccache
          sudo rm -rf "$GITHUB_WORKSPACE/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/build" || true
          sudo rm -rf "$GITHUB_WORKSPACE/kernel/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/.repo" || true
          sudo rm -rf /tmp/* || true
          
          # Show ccache stats (don't clear it!)
          if command -v ccache >/dev/null 2>&1; then
            echo ""
            echo "📊 ccache statistics after build:"
            ccache -s
            echo ""
            echo "💾 ccache preserved for next build"
          fi
          
          echo ""
          echo "💽 Final disk usage:"
          df -h /
          
          echo "::endgroup::"

  trigger-release:
    needs: [build]
    runs-on: ubuntu-latest
    environment: Production-Release
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: 'OnePlus Kernels With KSUN & SUSFS integrated — SakFi'
      SUSFS_BASE_VERSION: 'v2.1.0'
      NEW_TAG: ''
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏷️ Generate and Create New Unique Tag
        id: generate_tag
        run: |
          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[].name' 2>/dev/null | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          if [ -z "$LATEST_TAG" ]; then
            BASE_TAG="v1.0.1"
          else
            MAJOR=$(echo "$LATEST_TAG" | awk -F. '{print $1}')
            MINOR=$(echo "$LATEST_TAG" | awk -F. '{print $2}')
            PATCH=$(echo "$LATEST_TAG" | awk -F. '{print $3}')
            PATCH=$((PATCH + 1))
            BASE_TAG="$MAJOR.$MINOR.$PATCH"
          fi
          
          # Ensure tag uniqueness by checking against remote
          TAG_TO_USE="$BASE_TAG"
          while gh api "repos/$REPO_OWNER/$REPO_NAME/git/ref/tags/$TAG_TO_USE" --silent 2>/dev/null; do
            echo "⚠️ Tag $TAG_TO_USE already exists. Incrementing patch version..."
            MAJOR=$(echo "$TAG_TO_USE" | awk -F. '{print $1}')
            MINOR=$(echo "$TAG_TO_USE" | awk -F. '{print $2}')
            PATCH=$(echo "$TAG_TO_USE" | awk -F. '{print $3}')
            PATCH=$((PATCH + 1))
            TAG_TO_USE="$MAJOR.$MINOR.$PATCH"
          done
          
          echo "✅ Final unique tag: $TAG_TO_USE"
          echo "NEW_TAG=${TAG_TO_USE}" >> $GITHUB_ENV
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_TO_USE"
          git push origin "$TAG_TO_USE"

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts
          merge-multiple: true
          skip-decompress: true

      - name: 📝 Generate Device List and Final Release Notes
        id: generate-notes
        run: |
          echo "=== Start building the release notes ==="
          
          # Collect build metadata
          declare -A device_info
          
          JSON_BUILD_DATA=$(jq -c '.' ./downloaded-artifacts/matrix.json)
          
          for file in $(find downloaded-artifacts -maxdepth 1 -name "*.zip" -type f | sort); do
            if [ -f "$file" ]; then
              zipname=$(basename "$file" .zip)
              rest="${zipname#AK3_}"
              IFS='_' read -ra parts <<< "$rest"
              model="${parts[0]}"
              os_version="${parts[1]}"
              kernel_version="${parts[2]}"
              ksu_type="${parts[3]}"
              ksu_ver="${parts[4]}"
              if [ "${parts[5]:-}" = "SuSFS" ]; then
                susfs_ver="${parts[6]:-unknown}"
              else
                susfs_ver="none"
              fi
              full_model="${model}_${os_version}"
              device_info["$full_model"]="$model|$os_version|$kernel_version|$ksu_type|$ksu_ver|$susfs_ver"
            fi
          done
          
          ksu_options_raw='${{ github.event.inputs.ksu_options }}'
          ksu_options_normalized=$(echo "$ksu_options_raw" | jq -c 'map(if .type then .type |= ascii_upcase | if .hash == null then if .type == "KSUN" then .hash = "dev" elif .type == "KSU" then .hash = "main" else .hash end else . end else error("No type found") end)' 2>&1)
          
          ksun_hash=$(echo "$ksu_options_normalized" | jq -r 'map(select(.type == "KSUN")) | first | .hash // empty')
          ksu_hash=$(echo "$ksu_options_normalized" | jq -r 'map(select(.type == "KSU")) | first | .hash // empty')
          
          # Get workflow inputs for reference
          KSUN_BRANCH="$ksun_hash"
          KSU_BRANCH="$ksu_hash"
          
          OPTIMIZE_LEVEL="${{ inputs.optimize_level }}"
          CLEAN_BUILD="${{ inputs.clean_build }}"
          
          # Determine SUSFS branches used
          SUSFS_A12="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
          SUSFS_A13="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
          SUSFS_A14="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
          SUSFS_A15="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
          SUSFS_A16="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          
          [ -z "$SUSFS_A12" ] && SUSFS_A12="gki-android12-5.10 (auto)"
          [ -z "$SUSFS_A13" ] && SUSFS_A13="gki-android13-5.15 (auto)"
          [ -z "$SUSFS_A14" ] && SUSFS_A14="gki-android14-6.1 (auto)"
          [ -z "$SUSFS_A15" ] && SUSFS_A15="gki-android15-6.6 (auto)"
          [ -z "$SUSFS_A16" ] && SUSFS_A16="gki-android16-6.12 (auto)"
          
          cat << EOF > release_notes.md
          <div align="center">
          
          # 🔥 OnePlus Kernels Release 🔥
          
          [![Release](https://img.shields.io/github/v/release/${{ github.repository }}?style=flat-square&color=blue)](${{ github.server_url }}/${{ github.repository }}/releases/latest)
          [![Downloads](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.NEW_TAG }}/total?style=flat-square&color=green)](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})
          [![Workflow](https://img.shields.io/badge/Workflow-Build--Kernel-orange?style=flat-square)](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          <a href="${{ github.server_url }}/${{ github.repository }}">
            <img src="https://readme-typing-svg.herokuapp.com?font=Fira+Code&weight=500&size=20&duration=3000&pause=1000&color=00FF99&center=true&vCenter=true&width=600&lines=KernelSU-Next+%2B+SUSFS+Release;Built+for+OnePlus+GKI+devices;Version+${{ env.NEW_TAG }};Maintained+by+sakfi" alt="Typing SVG" />
          </a>
          
          > **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC') | **Build ID:** \`${{ github.run_id }}\`
          
          </div>
          
          ---
          
          ## 📦 Built Devices (${#device_info[@]} total)
          
          | Model | OS Version | Kernel Version | Features |
          |-------|------------|----------------|----------|
          EOF
          
          for full_key in $(printf '%s\n' "${!device_info[@]}" | sort); do
            IFS='|' read -r model os_ver kernel_ver _ _ _ <<< "${device_info[$full_key]}"
            
            # Use jq to extract feature flags for this model from the JSON matrix
            feature_flags=$(jq -r --arg MODEL "$model" '
              .[] | 
              select(.model == $MODEL) |
              "\(.hmbird // false)\t\(.susfs // false)\t\(.bbr // false)\t\(.bbg // false)\t\(.ttl // false)\t\(.ip_set // false)"
            ' <<< "$JSON_BUILD_DATA")
            
            features=""
             # If no match found, skip or handle error
            if [[ -z "$feature_flags" ]]; then
              echo "Warning: No JSON entry found for model: $model" >&2
            else
              IFS=$'\t' read -r hmbird susfs bbr bbg ttl ip_set <<< "$feature_flags"
              
              # Build features string based on boolean values
              [[ "$hmbird" == "true" ]] && features+="🐦 HMBIRD "
              [[ "$susfs" == "true" ]] && features+="ඞ SusFS "
              [[ "$bbr" == "true" ]] && features+="🚀 BBR "
              [[ "$bbg" == "true" ]] && features+="🛡️ BBG "
              [[ "$ttl" == "true" ]] && features+="⏱️ TTL "
              [[ "$ip_set" == "true" ]] && features+="🔧 IP_SET"
            fi
            
            printf "| %-13s | %-10s | %-16s | %-30s |\n" \
              "$model" "$os_ver" "$kernel_ver" "$features" >> release_notes.md
          done
          
          if [ ${#device_info[@]} -gt 0 ]; then
            first_entry=$(printf '%s\n' "${!device_info[@]}" | sort | head -n1)
            IFS='|' read -r _ _ _ _ ksu_ver_global _ <<< "${device_info[$first_entry]}"
          else
            echo "::error::No device info found!" >&2
            exit 1
          fi
          
          cat << EOF >> release_notes.md
          
          ---
          
          <details>
          <summary><b>⚙️ View Build Configuration Details</b></summary>
          
          <br>
          
          ## 🔧 Build Configuration
          
          | Component | Version/Setting |
          |-----------|----------------|
          EOF
          if [ -n "$KSUN_BRANCH" ]; then
            cat << EOF >> release_notes.md
          | **KernelSU Next Branch** | \`$KSUN_BRANCH\` |
          | **KernelSU Next Version** | \`$ksu_ver_global\` |
          EOF
          elif [ -n "$KSU_BRANCH" ]; then
            cat << EOF >> release_notes.md
          | **KernelSU Branch** | \`$KSU_BRANCH\` |
          | **KernelSU Version** | \`$ksu_ver_global\` |
          EOF
          else
            cat << EOF >> release_notes.md
          | **Unknown KernelSU Fork Branch** | \`\` |
          | **Unknown KernelSU Fork Version** | \`\` |
          EOF
          fi
          cat << EOF >> release_notes.md
          | **SUSFS Version** | \`$SUSFS_BASE_VERSION\` |
          | **Optimization Level** | \`$OPTIMIZE_LEVEL\` |
          | **Clean Build** | $( [ "$CLEAN_BUILD" = "true" ] && echo "✅ Yes (no ccache)" || echo "❌ No (ccache enabled)" ) |
          | **Compiler** | Clang (version varies by device) |
          
          ### 📌 SUSFS Branch Mapping
          
          | Kernel Version | SUSFS Branch/Commit |
          |----------------|---------------------|
          | android12-5.10 | \`$SUSFS_A12\` |
          | android13-5.15 | \`$SUSFS_A13\` |
          | android14-6.1  | \`$SUSFS_A14\` |
          | android15-6.6  | \`$SUSFS_A15\` |
          | android16-6.12 | \`$SUSFS_A16\` |
          
          </details>
          
          ---
          
          ## ✨ Features & Capabilities
          
          | 🏷️ Feature | 📝 Description |
          |:---|:---|
          EOF
          if [ -n "$KSUN_BRANCH" ]; then
            cat << EOF >> release_notes.md
          | 🔐 **KernelSU-Next** | Next-generation kernel-level root solution |
          EOF
          elif [ -n "$KSU_BRANCH" ]; then
            cat << EOF >> release_notes.md
          | 🔐 **KernelSU** | Kernel-level root solution |
          EOF
          fi
          cat << EOF >> release_notes.md
          | 🥷 **SUSFS $SUSFS_BASE_VERSION** | Advanced root hiding with Magic Mount support |
          | 🛠️ **Manual Hooks** | \`scope_min_manual_hooks_v1.4\` for better app compatibility |
          | 🖧 **BBR** | Improved TCP congestion control |
          | 🛡️ **BBG** | LSM-based Baseband Guard security |
          | 🌐 **TTL Target Support** | Network packet manipulation |
          | 🧱 **IP Set Support** | Advanced firewall capabilities |
          | 🏗️ **HMBIRD SCX** | Scheduler extensions for SM8750 devices |
          | ✅ **LTO** | Link Time Optimization |
          | ⚡️ **TMPFS XATTR** | Extended attributes for Mountify support |
          | 🚀 **Optimization** | Memory, I/O, CPU scheduler, network tuning patches |
          
          <br>
          
          <details>
          <summary><b>👀 View SUSFS Hide Capabilities</b></summary>
          
          - ✅ SUS_PATH · SUS_MOUNT · SUS_KSTAT · SUS_MAP
          - ✅ SPOOF_UNAME · SPOOF_CMDLINE · OPEN_REDIRECT · AVC_SPOOF
          </details>
          
          ---
          
          ## 📱 Manager Applications
          
          ### Official Manager
          EOF
          if [ -n "$KSUN_BRANCH" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU Next Manager**  
            → [GitHub](https://github.com/KernelSU-Next/KernelSU-Next)
          - **Wild KernelSU Manager** (Alternative) 
            → [GitHub](https://github.com/WildKernels/KernelSU_Action/releases)
          EOF
          elif [ -n "$KSU_BRANCH" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU Manager**  
            → [GitHub Release](https://github.com/tiann/KernelSU/releases)
          - **Wild KernelSU Manager** (Alternative)  
            → [GitHub Release](https://github.com/WildKernels/KernelSU_Action/releases)
          EOF
          fi
          cat <<EOF >> release_notes.md
          
          ### SusFS Module
          - **KSU SUSFS Module** (Required for SUSFS features)  
            → [GitHub Release](https://github.com/sidex15/ksu_module_susfs/releases)
          
          ### Recommended Flasher
          - **Kernel Flasher** (Recommended for flashing AnyKernel3 ZIPs, backups and OTA)  
            → [GitHub Release](https://github.com/fatalcoder524/KernelFlasher/releases)
          - **KSUN Built-in Flasher** (Alternative flasher)  
            → Accessible directly within the KernelSU Next Manager app
          
          ---
          
          ## 📥 Installation Instructions
          
          <details>
          <summary><b>🛠️ View Prerequisites</b></summary>
          
          - Unlocked bootloader.
          - Backup your current boot image.
          - Have root access using Magisk / KernelSU (Any forks) / Apatch.
          </details>
          
          ### Via Kernel Flasher
          1. Download the appropriate ZIP for your device from the Assets below.
          2. Flash the ZIP file using [Kernel Flasher](https://github.com/fatalcoder524/KernelFlasher) or [Horizon Kernel Flasher](https://github.com/libxzr/HorizonKernelFlasher).
          3. Reboot system.
          4. Install KernelSU-Next Manager (or KernelSU Manager depending on build).
          5. Install SUSFS module from manager.
          
          ---
          
          ## 📜 Changelog
          
          ### This Release
          EOF
          
          # Auto-generate changelog from git commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "Generating changelog since tag: $LAST_TAG"
            git log "$LAST_TAG"..HEAD --pretty=format:"          - %s" --no-merges >> release_notes.md
          else
            echo "No previous tag found, using last 10 commits"
            git log --pretty=format:"          - %s" --no-merges -10 >> release_notes.md
          fi
          
          cat <<EOF >> release_notes.md
          
          ### Previous Releases
          See [Releases Page](${{ github.server_url }}/${{ github.repository }}/releases)
          
          ---
          
          ## 🌟 Special Thanks
          
          These amazing people help make this project possible! ❤️
          
          <div align="center">
          
          | 🔧 Project/Role | 👨‍💻 Developer | 🔗 Link |
          |:---:|:---:|:---:|
          | **Original Repository** | fatalcoder524 | [![GitHub](https://img.shields.io/badge/GitHub-fatalcoder524-blue?style=flat-square&logo=github)](https://github.com/fatalcoder524) |
          | **KernelSU** | tiann | [![GitHub](https://img.shields.io/badge/GitHub-tiann-blue?style=flat-square&logo=github)](https://github.com/tiann/KernelSU) |
          | **KernelSU-Next** | rifsxd | [![GitHub](https://img.shields.io/badge/GitHub-rifsxd-blue?style=flat-square&logo=github)](https://github.com/KernelSU-Next/KernelSU-Next) |
          | **SUSFS** | simonpunk | [![GitLab](https://img.shields.io/badge/GitLab-simonpunk-orange?style=flat-square&logo=gitlab)](https://gitlab.com/simonpunk/susfs4ksu.git) |
          | **SUSFS Module** | sidex15 | [![GitHub](https://img.shields.io/badge/GitHub-sidex15-blue?style=flat-square&logo=github)](https://github.com/sidex15) |
          | **Optimization Patches** | backslashxx | [![GitHub](https://img.shields.io/badge/GitHub-backslashxx-blue?style=flat-square&logo=github)](https://github.com/backslashxx) |
          | **Optimization Patches** | liqideqq (Teemo) | [![GitHub](https://img.shields.io/badge/GitHub-liqideqq-blue?style=flat-square&logo=github)](https://github.com/liqideqq) |
          
          </div>
          
          ---
          
          ## 💬 Support & Connect
          
          <div align="center">
          
          [![Telegram](https://img.shields.io/badge/Telegram-SakFi-blue?logo=telegram)](http://t.me/SakFi)
          [![GitHub](https://img.shields.io/badge/GitHub-SakFi-blue?logo=github)](https://github.com/sakfi)
          
          <br>
          
          **⚡ Built with ❤️ by [sakfi](https://github.com/sakfi)**
          
          </div>
          
          EOF
          
          echo "--- Final Release Notes ---"
          cat release_notes.md

      - name: 🚀 Create GitHub Release
        run: |
          gh release create "${{ env.NEW_TAG }}" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md

      - name: 📤 Upload Release Assets Dynamically
        run: |
          for file in ./downloaded-artifacts/*.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              gh release upload "${{ env.NEW_TAG }}" "$file" --clobber
            fi
          done

      - name: 📊 Release summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          
          ---
          
          ## 🎉 Release Created Successfully
          
          **Tag:** [\`${{ env.NEW_TAG }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})  
          **Kernels:** $(find ./downloaded-artifacts -maxdepth 1 -name "*.zip" -type f | wc -l)
          
          ### 📦 Assets
          EOF
          
          for zip in ./downloaded-artifacts/*.zip; do
            if [ -f "$zip" ]; then
              name=$(basename "$zip")
              size=$(stat -c%s "$zip")
              size_mb=$(echo "scale=2; $size / 1024 / 1024" | bc)
              echo "- \`$name\` (${size_mb} MB)" >> $GITHUB_STEP_SUMMARY
            fi
          done
